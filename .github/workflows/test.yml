name: Install and test fdvar

on:
  # Run on pushes to master
  push:
    branches:
      - main
  # And all pull requests
  pull_request:
  schedule:
    # Scheduled run over at 0333 UTC Sunday to detect any upstream breaks.
    # * is a special character in YAML so you have to quote this string
    - cron:  '33 3 * * 0'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  # Cancels jobs running if new commits are pushed
  group: >
    ${{ github.workflow }}-
    ${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Build and test fdvar"
    # Use Firedrake's Linux runners
    runs-on: [self-hosted, Linux]
    container:
      # TODO: Switch to latest firedrake release after 2026.4
      image: firedrakeproject/firedrake-vanilla-default:dev-main
    env:
      # Tell pyop2 to complain if SPMD assumptions are broken
      PYOP2_SPMD_STRICT: 1
      # Make sure tests with >8 processes are not silently skipped
      PYTEST_MPI_MAX_NPROCS: 8
      # Tell PETSc to ignore the pytest command line arguments
      FIREDRAKE_DISABLE_OPTIONS_LEFT: 1
      # run the demos with smaller problem sizes
      FIREDRAKE_CI: 1
      # Common arguments for pytest.
      PYTEST_ARGS: --durations=10 --timeout=180 --timeout-method=thread -o faulthandler_timeout=200 --verbose fdvar-repo/tests/
      # venv activation script
      ACTIVATE: venv-fdvar/bin/activate
    steps:
      - name: Fix HOME
        # For unknown reasons GitHub actions overwrite HOME to /github/home
        # which will break everything unless fixed
        # (https://github.com/actions/runner/issues/863)
        run: echo "HOME=/home/firedrake" >> "$GITHUB_ENV"

      - name: Pre-cleanup
      # TODO: Why do we need to do this?
        run: |
          : # Wipe everything away in the current directory
          find . -delete
          firedrake-clean

      - uses: actions/checkout@v4
        with:
          # Download fdvar into a subdirectory not called 'fdvar' to make sure
          # that the package installs correctly. Otherwise 'import fdvar' may
          # work even if the installation failed because it is a subdirectory.
          path: fdvar-repo

      - name: Create virtual environment
        # pass '--system-site-packages' so Firedrake can be found
        run: python3 -m venv --system-site-packages venv-fdvar

      - name: Install fdvar
        id: install
        run: |
          . $ACTIVATE
          python --version
          pip --version
          pip install './fdvar-repo[ci]'
          pip list

      - name: Lint
        run: |
          . $ACTIVATE
          cd ./fdvar-repo
          flake8 .

      - name: Run tests (nprocs = 1)
        # Run even if earlier tests failed
        if: success() || steps.install.conclusion == 'success'
        run: |
          . $ACTIVATE
          : # Use pytest-xdist here so we can have a single collated output (not possible
          : # for parallel tests)
          firedrake-run-split-tests 1 1 "$PYTEST_ARGS" -k 'not demos'
          firedrake-run-split-tests 1 1 "$PYTEST_ARGS" -k 'demos'
        timeout-minutes: 10

      - name: Run tests (nprocs = 2)
        # Run even if earlier tests failed
        if: success() || steps.install.conclusion == 'success'
        run: |
          . $ACTIVATE
          firedrake-run-split-tests 2 1 "$PYTEST_ARGS" -k 'not demos'
          firedrake-run-split-tests 2 1 "$PYTEST_ARGS" -k 'demos'
        timeout-minutes: 10

      - name: Run tests (nprocs = 3)
        # Run even if earlier tests failed
        if: success() || steps.install.conclusion == 'success'
        run: |
          . $ACTIVATE
          firedrake-run-split-tests 3 1 "$PYTEST_ARGS"
        timeout-minutes: 10

      - name: Run tests (nprocs = 4)
        # Run even if earlier tests failed
        if: success() || steps.install.conclusion == 'success'
        run: |
          . $ACTIVATE
          firedrake-run-split-tests 4 1 "$PYTEST_ARGS"
        timeout-minutes: 10

      - name: Run tests (nprocs = 5)
        # Run even if earlier tests failed
        if: success() || steps.install.conclusion == 'success'
        run: |
          . $ACTIVATE
          firedrake-run-split-tests 5 1 "$PYTEST_ARGS"
        timeout-minutes: 10

      - name: Run tests (nprocs = 6)
        # Run even if earlier tests failed
        if: success() || steps.install.conclusion == 'success'
        run: |
          . $ACTIVATE
          firedrake-run-split-tests 6 1 "$PYTEST_ARGS"
        timeout-minutes: 10

      - name: Upload pytest log files
        uses: actions/upload-artifact@v4
        if: success() || steps.install.conclusion == 'success'
        with:
          name: pytest-logs
          path: pytest_*.log
          retention-days: 7

      - name: Post-cleanup
        if: always()
        run: |
          find . -delete
          firedrake-clean
