name: Build/deploy docs

on:
  # Run on pushes to main
  push:
    branches:
      - main
  # TODO remove on: pull_request
  pull_request:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Cancels jobs running if new commits are pushed
  group: >
    ${{ github.workflow }}-
    ${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: [self-hosted, Linux]
    container:
      # TODO: Switch to latest firedrake release after 2026.4
      image: firedrakeproject/firedrake-vanilla-default:dev-main
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      ACTIVATE: venv-fdvar/bin/activate
    steps:
      - name: Fix HOME
        # For unknown reasons GitHub actions overwrite HOME to /github/home
        # which will break everything unless fixed
        # (https://github.com/actions/runner/issues/863)
        run: echo "HOME=/home/firedrake" >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: |
          apt-get update

      - uses: actions/checkout@v4
        with:
          path: fdvar-repo

      - name: Install fdvar
        # pass '--system-site-packages' so Firedrake can be found
        run: |
          python3 -m venv --system-site-packages venv-fdvar
          . $ACTIVATE
          pip install --verbose './fdvar-repo[docs]'

      - name: Check documentation links
        if: github.ref == 'refs/heads/main'
        run: |
          . $ACTIVATE
          make -C fdvar-repo/docs linkcheck

      - name: Build docs
        run: |
          . $ACTIVATE
          cd fdvar-repo/docs
          make html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: /__w/fdvar/fdvar/fdvar-repo/docs/build/html
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
